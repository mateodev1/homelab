version: "3"

dotenv: [".env"]

tasks:
  dev:
    desc: "Start backend and frontend in dev mode"
    cmds:
      - docker compose up

  test:
    desc: "Run all tests"
    cmds:
      - task: test:go
      - task: test:frontend

  test:go:
    desc: "Run Go tests"
    cmds:
      - go test -race ./...
      - golangci-lint run ./...

  test:frontend:
    desc: "Run frontend tests"
    cmds:
      - pnpm --dir frontend test --run
      - pnpm --dir frontend run lint

  web:dev:
    desc: "Start the TanStack web app in dev mode (port 3000)"
    cmds:
      - pnpm --dir web dev

  test:web:
    desc: "Run web (TanStack) tests"
    cmds:
      - pnpm --dir web test

  build:
    desc: "Build all binaries"
    cmds:
      - go build ./backend/cmd/api
      - go build ./cli/cmd/homelab

  lint:
    desc: "Lint all code"
    cmds:
      - task: lint:go
      - task: lint:frontend

  lint:go:
    desc: "Lint Go code"
    cmds:
      - golangci-lint run ./...

  lint:frontend:
    desc: "Lint frontend"
    cmds:
      - pnpm --dir frontend run lint

  migrate:
    desc: "Run database migrations"
    cmds:
      - echo "No migrations yet"

  docker:build:
    desc: "Build Docker images"
    cmds:
      - docker compose build
