root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./backend/cmd/api"
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "testdata", "frontend", "cli", "docker", "docs", "data"]
  include_ext = ["go"]
  exclude_regex = ["_test\\.go"]

[log]
  time = false

[color]
  main     = "magenta"
  watcher  = "cyan"
  build    = "yellow"
  runner   = "green"

[misc]
  clean_on_exit = true
