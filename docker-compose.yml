services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - ./data:/data
    environment:
      - PORT=8080
      - DB_PATH=/data/homelab.db
      - ENV=development
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8080

volumes: {}
