name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.3.0
          working-directory: backend

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    needs: [lint-go]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum
      - name: go mod tidy (backend)
        run: cd backend && go mod tidy
      - name: go mod tidy (shared)
        run: cd shared && go mod tidy
      - name: go mod tidy (cli)
        run: cd cli && go mod tidy
      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./backend/... ./shared/...
      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 60% threshold"
            exit 1
          fi

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm --dir frontend install
      - name: Lint
        run: pnpm --dir frontend run lint
      - name: Type check
        run: pnpm --dir frontend run type-check

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm --dir frontend install
      - name: Run tests with coverage
        run: pnpm --dir frontend run coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-go, test-frontend, lint-go, lint-frontend]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Build backend
        run: go build ./backend/cmd/api
      - name: Build CLI
        run: go build ./cli/cmd/homelab

  build-and-push-backend:
    name: Build and push backend image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test-go, test-frontend, lint-go, lint-frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/homelab-backend
          tags: |
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/backend.Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-and-push-frontend:
    name: Build and push frontend image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test-go, test-frontend, lint-go, lint-frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/homelab-frontend
          tags: |
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frontend.Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_AUTH0_DOMAIN=${{ secrets.VITE_AUTH0_DOMAIN }}
            VITE_AUTH0_CLIENT_ID=${{ secrets.VITE_AUTH0_CLIENT_ID }}

  deploy:
    name: Deploy to homelab
    runs-on: self-hosted
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-and-push-backend, build-and-push-frontend]
    environment: homelab
    steps:
      - name: Deploy
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          cd ~/homelab
          docker compose pull
          docker compose up -d
          docker image prune -f
          docker logout ghcr.io
          echo "Deploy done: $(date)"
